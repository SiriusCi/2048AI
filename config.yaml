server:
  host: 127.0.0.1
  port: 8080

sync:
  # Backend waits this long after frontend sends step-done.
  postAckDelaySec: 0.1

trainingDefaults:
  episodes: 1000
  workers: 1
  seed: null
  maxSteps: null
  terminateOnWin: true
  syncWithFrontend: false

  tensorboardLogDir: runs/2048
  tensorboardRunName: null

  checkpointEveryEpisodes: 100
  checkpointDir: models/2048
  checkpointPrefix: dqn_cnn
  loadModelPath: null
  playOnly: false

rl:
  maxExponent: 15
  gamma: 0.99
  learningRate: 0.0001
  batchSize: 128
  replayCapacity: 50000
  minReplaySize: 1000
  targetUpdateFreq: 500
  trainFreq: 4
  maxGradNorm: 10.0
  epsilonStart: 1.0
  epsilonEnd: 0.01
  epsilonDecaySteps: 50000
  invalidActionPenalty: 0.0
  mergeValueBonusScale: 1.0
