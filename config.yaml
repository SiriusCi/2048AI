server:
  host: 127.0.0.1
  port: 8080

sync:
  # Backend waits this long after frontend sends step-done.
  postAckDelaySec: 0.1

trainingDefaults:
  episodes: 1000
  workers: 1
  seed: null
  maxSteps: null
  terminateOnWin: true
  syncWithFrontend: false

  tensorboardLogDir: runs/2048
  tensorboardRunName: null

  checkpointEveryEpisodes: 100
  checkpointDir: models/2048
  checkpointPrefix: reinforce_cnn
  loadModelPath: null
  playOnly: false

rl:
  maxExponent: 15
  gamma: 0.95
  learningRate: 0.001
  entropyCoef: 0.05
  valueCoef: 0.5
  maxGradNorm: 0.5
  invalidActionPenalty: 0.0
  mergeValueBonusScale: 1.0
