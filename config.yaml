server:
  host: 127.0.0.1
  port: 8080

sync:
  # Backend waits this long after frontend sends step-done.
  postAckDelaySec: 0.1

trainingDefaults:
  episodes: 1000
  workers: 1
  seed: null
  maxSteps: null
  terminateOnWin: true
  syncWithFrontend: false

  tensorboardLogDir: runs/2048
  tensorboardRunName: null

  checkpointEveryEpisodes: 100
  checkpointDir: models/2048
  checkpointPrefix: dqn_cnn
  loadModelPath: null
  playOnly: false

rl:
  maxExponent: 15
  gamma: 0.99
  learningRate: 0.00005
  batchSize: 256
  replayCapacity: 200000
  minReplaySize: 5000
  targetUpdateFreq: 2000
  trainFreq: 1
  gradientSteps: 4
  numEnvs: 8
  maxGradNorm: 10.0
  epsilonStart: 1.0
  epsilonEnd: 0.01
  epsilonDecaySteps: 100000
  invalidActionPenalty: 0.0
  mergeValueBonusScale: 0.0
  rewardLogScale: true
  emptyCellRewardScale: 0.25
